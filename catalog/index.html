<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Car Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topnav" role="banner">
    <div class="topnav-inner">
      <a href="#" class="brand-mark" data-route="home">
        <span class="brand-mark-name">Car&nbsp;Catalog</span>
      </a>
      <nav class="topnav-links" aria-label="Primary">
        <div class="dropdown" data-dropdown="brand">
          <button type="button" class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
            <span>Brands</span>
            <span class="dropdown-caret" aria-hidden="true">›</span>
          </button>
          <ul class="dropdown-menu" id="brand-menu" role="menu"></ul>
        </div>
        <div class="dropdown" data-dropdown="body">
          <button type="button" class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
            <span>Body styles</span>
            <span class="dropdown-caret" aria-hidden="true">›</span>
          </button>
          <ul class="dropdown-menu" id="body-menu" role="menu"></ul>
        </div>
        <a href="#compare=" class="topnav-link">Compare</a>
      </nav>
      <form class="search-form" role="search" autocomplete="off">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input type="search" id="search-input" name="q" placeholder="Search models, trims, brands" aria-label="Search">
        <ul id="search-suggestions" role="listbox" hidden></ul>
      </form>
      <button type="button" class="sidenav-toggle" aria-label="Toggle navigation" aria-controls="sidenav" aria-expanded="false">
        <span aria-hidden="true">≡</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidenav" id="sidenav" aria-label="Section navigation" hidden>
      <div class="sidenav-head">
        <span class="eyebrow" id="sidenav-eyebrow">Models</span>
      </div>
      <nav>
        <ol id="sidenav-list"></ol>
      </nav>
    </aside>

    <main id="main" tabindex="-1" aria-live="polite"></main>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel">
      <button type="button" class="modal-close" aria-label="Close" data-close-modal>×</button>
      <h2 id="modal-title" class="modal-title"></h2>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <footer class="sitefoot" role="contentinfo">
    <div class="sitefoot-inner">
      <div class="sitefoot-stats">
        <span class="sitefoot-mark">Car&nbsp;Catalog</span>
        <span class="sitefoot-dot" aria-hidden="true">·</span>
        <span id="sitefoot-counts"></span>
        <span class="sitefoot-dot" aria-hidden="true">·</span>
        <span id="build-date"></span>
      </div>
      <div class="sitefoot-links">
        <a href="#" id="open-data-modal">Browse data files</a>
      </div>
    </div>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
